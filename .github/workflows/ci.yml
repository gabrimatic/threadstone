name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python ${{ matrix.python-version }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python3 -m pip install -e .

      # No ~/mlx-env exists on the runner. This proves a fresh pip install can
      # run the CLI before setup.sh was ever executed, and that --doctor
      # reports the missing venv gracefully (exit 1) instead of crashing.
      - name: CLI smoke test
        run: |
          threadstone --version
          threadstone --list-models
          set +e
          threadstone --doctor --all-models
          code=$?
          set -e
          test "$code" -eq 1

      - name: Unit tests
        run: python3 -m unittest discover -s tests -t . -v

      - name: Compile sources
        run: python3 -m compileall config.py threadstone.py tests

  package:
    name: Package build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python3 -m pip install build twine

      - name: Build distributions
        run: python3 -m build --sdist --wheel

      - name: Check distributions
        run: python3 -m twine check dist/*

  setup-check:
    name: Setup script syntax
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Syntax check
        run: bash -n setup.sh
