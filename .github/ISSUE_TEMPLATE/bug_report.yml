name: Bug Report
description: Report a bug in Threadstone
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Brief description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `oracle ...`
        2. Type ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model size
      description: Which model were you using?
      placeholder: "e.g. 9B, 4B, 2B, 0.8B"

  - type: input
    id: macos
    attributes:
      label: macOS version and chip
      placeholder: "e.g. macOS 15.3, M4"

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant terminal output or server logs.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help.
